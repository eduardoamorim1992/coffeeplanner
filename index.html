<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#b91c1c" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoffePlanner" />
    <link rel="apple-touch-icon" href="/coffee.svg" />

    <!-- Nome da aplicação -->
    <title>CoffePlanner</title>
    <meta name="description" content="Sistema de planejamento e controle semanal das divisões." />
    <meta name="author" content="CoffePlanner" />

    <!-- Favicon -->
    <link rel="icon" href="/coffee.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="CoffePlanner" />
    <meta property="og:description" content="Sistema de planejamento semanal corporativo." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/coffee.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CoffePlanner" />
    <meta name="twitter:description" content="Sistema de planejamento semanal corporativo." />
    <meta name="twitter:image" content="/coffee.svg" />
  </head>

  <body>
    <!-- Roda com <body> já criado: pinta html + body nas rotas de auth (evita branco ao F5) -->
    <script>
      (function () {
        var p = location.pathname;
        if (
          p === "/login" ||
          p === "/cadastro" ||
          p === "/cadastro/obrigado" ||
          p === "/aguardando-aprovacao" ||
          p === "/definir-senha"
        ) {
          var bg = "hsl(220, 20%, 7%)";
          document.documentElement.style.backgroundColor = bg;
          document.documentElement.style.colorScheme = "dark";
          document.body.style.backgroundColor = bg;
          document.body.style.colorScheme = "dark";
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
